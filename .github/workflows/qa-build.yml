name: QA Plot Story Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [build-qa-plot-story]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: TypeScript
        run: npx tsc --noEmit
      - name: Expo web export
        run: npm run build
