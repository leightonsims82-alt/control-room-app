name: QA Plot Story Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [build-qa-plot-story]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install --silent
      - name: TypeScript
        shell: bash
        run: |
          set -o pipefail
          npx tsc --noEmit 2>&1 | tail -n 120
      - name: Expo web export
        run: npm run build -- --clear
